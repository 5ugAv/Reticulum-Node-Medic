# Reticulum transport + Meshtastic bridge template
# Adds a Meshtastic interface alongside the RNode LoRa interface.

[reticulum]
enable_transport = Yes
share_instance = Yes
shared_instance_port = 37428
instance_control_port = 37429
panic_on_interface_error = No

[logging]
loglevel = 4

[interfaces]

  [[RNode LoRa Interface]]
    type = RNodeInterface
    enabled = Yes
    port = {{SERIAL_PORT}}
    frequency = {{FREQUENCY}}
    bandwidth = {{BANDWIDTH}}
    txpower = {{TXPOWER}}
    spreadingfactor = {{SF}}
    codingrate = {{CR}}
    id_callsign = RTT-BRIDGE

  [[Meshtastic Bridge Interface]]
    type = TCPClientInterface
    enabled = Yes
    target_host = 127.0.0.1
    target_port = 4403
