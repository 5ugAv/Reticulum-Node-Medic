# Reticulum transport node — default template
# Placeholders are substituted by the Reticulum Field Tool build workflow.

[reticulum]
enable_transport = Yes
share_instance = Yes
shared_instance_port = 37428
instance_control_port = 37429
panic_on_interface_error = No

[logging]
loglevel = 4

[interfaces]

  [[RNode LoRa Interface]]
    type = RNodeInterface
    enabled = Yes
    port = {{SERIAL_PORT}}
    frequency = {{FREQUENCY}}
    bandwidth = {{BANDWIDTH}}
    txpower = {{TXPOWER}}
    spreadingfactor = {{SF}}
    codingrate = {{CR}}
    id_callsign = RTT
