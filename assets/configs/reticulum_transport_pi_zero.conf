# Reticulum transport node — Raspberry Pi Zero 2W / 3A+ template
# Constrained RAM; conservative settings for long unattended runtime.

[reticulum]
enable_transport = Yes
share_instance = Yes
shared_instance_port = 37428
instance_control_port = 37429
panic_on_interface_error = No

[logging]
loglevel = 3

[interfaces]

  [[RNode LoRa Interface]]
    type = RNodeInterface
    enabled = Yes
    port = {{SERIAL_PORT}}
    frequency = {{FREQUENCY}}
    bandwidth = {{BANDWIDTH}}
    txpower = {{TXPOWER}}
    spreadingfactor = {{SF}}
    codingrate = {{CR}}
    id_callsign = RTT-ZERO
