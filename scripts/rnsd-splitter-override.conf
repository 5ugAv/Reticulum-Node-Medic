# rnsd waits for the splitter's virtual port so LoRa comes up through it.
# Installed to /etc/systemd/system/rnsd.service.d/ by scripts/setup_boot.sh.
[Unit]
After=rnode-splitter.service
Wants=rnode-splitter.service

[Service]
# Wait (up to 10 s) for the splitter's PTY symlink before starting rnsd.
ExecStartPre=/bin/bash -c 'for i in $(seq 1 20); do [ -e /tmp/rnode-jonesey ] && exit 0; sleep 0.5; done; echo "splitter port never appeared" >&2; exit 1'
